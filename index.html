<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Abdulaziz Training Week</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #060606;
    --card: #111111;
    --card-hover: #161616;
    --border: #1c1c1c;
    --accent: #e8ff47;
    --accent-dim: #a8b832;
    --accent-glow: rgba(232,255,71,0.08);
    --text: #f0f0f0;
    --muted: #555;
    --radius: 14px;
    --ease: cubic-bezier(0.16,1,0.3,1);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  /* ─── LOCK SCREEN ─────────────────────────────────────────────── */
  #lockScreen {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  #lockScreen.unlocked {
    opacity: 0;
    transform: scale(1.05);
    pointer-events: none;
  }

  .lock-inner {
    text-align: center;
    padding: 40px;
    width: 100%;
    max-width: 340px;
  }

  .lock-icon {
    width: 64px; height: 64px; margin: 0 auto 28px;
    border: 2px solid #222; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    animation: lockPulse 2s ease-in-out infinite;
  }

  @keyframes lockPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,255,71,0.15); }
    50% { box-shadow: 0 0 0 16px rgba(232,255,71,0); }
  }

  .lock-icon svg { width: 28px; height: 28px; }

  .lock-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .lock-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; font-weight: 300; }

  .pin-dots {
    display: flex; gap: 14px; justify-content: center; margin-bottom: 32px; height: 18px;
  }

  .pin-dot {
    width: 14px; height: 14px;
    border: 2px solid #2a2a2a;
    border-radius: 50%;
    transition: all 0.2s ease;
  }

  .pin-dot.filled {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(232,255,71,0.35);
  }

  .pin-dot.error {
    border-color: #ff4444;
    background: #ff4444;
    box-shadow: 0 0 12px rgba(255,68,68,0.35);
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .pin-pad {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; max-width: 260px; margin: 0 auto;
  }

  .pin-key {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 0.04em;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text);
    padding: 16px; cursor: pointer;
    transition: all 0.15s ease;
    -webkit-user-select: none; user-select: none;
  }

  .pin-key:active { background: #1a1a1a; transform: scale(0.95); }
  .pin-key.accent { color: var(--accent); border-color: #2a2a0a; }
  .pin-key.del { font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--muted); }

  .lock-error-msg {
    font-size: 12px; color: #ff4444; margin-top: 16px;
    min-height: 18px; letter-spacing: 0.04em;
    transition: opacity 0.2s;
  }

  /* ─── MAIN APP ────────────────────────────────────────────────── */
  #app {
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
  }

  #app.visible { opacity: 1; transform: translateY(0); }

  .container { max-width: 960px; margin: 0 auto; padding: 0 16px; position: relative; z-index: 1; }

  /* ─── HEADER ──────────────────────────────────────────────────── */
  header { padding: 48px 0 28px; text-align: center; }

  .header-eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--accent-dim); margin-bottom: 12px;
    display: inline-flex; align-items: center; gap: 8px;
  }

  .header-eyebrow::before, .header-eyebrow::after {
    content: ''; width: 20px; height: 1px; background: var(--accent-dim); opacity: 0.4;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 11vw, 90px);
    line-height: 0.88; letter-spacing: 0.02em;
  }

  h1 span { color: var(--accent); }

  .header-sub {
    margin-top: 14px; font-size: 13px; color: var(--muted);
    font-weight: 300; letter-spacing: 0.02em;
  }

  .today-badge {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 16px; padding: 6px 14px;
    background: rgba(232,255,71,0.06); border: 1px solid rgba(232,255,71,0.12);
    border-radius: 999px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent);
  }

  .today-badge .pulse-dot {
    width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
  }

  /* ─── STATUS ──────────────────────────────────────────────────── */
  #db-status {
    text-align: center; font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: #333; padding: 6px 0 0;
    min-height: 18px; transition: opacity 0.5s;
  }

  #db-status.hidden { opacity: 0; pointer-events: none; }

  /* ─── DAY GRID ────────────────────────────────────────────────── */
  .days-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 6px; margin: 32px 0 40px;
  }

  @media (max-width: 600px) {
    .days-grid { grid-template-columns: repeat(7, 1fr); gap: 4px; }
  }

  .day-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 4px; cursor: pointer;
    transition: all 0.2s; text-align: center; position: relative;
    -webkit-user-select: none; user-select: none;
  }

  .day-btn:active:not(.rest-day) { transform: scale(0.96); }
  .day-btn:hover:not(.rest-day) { border-color: #333; background: var(--card-hover); }

  .day-btn.active {
    border-color: var(--accent);
    background: linear-gradient(135deg, #1a1c0a, #12130a);
    box-shadow: 0 0 0 1px var(--accent), 0 4px 24px rgba(232,255,71,0.08);
  }

  .day-btn.active .day-name { color: var(--accent); }
  .day-btn.rest-day { opacity: 0.28; cursor: default; }

  .day-name {
    font-family: 'Bebas Neue', sans-serif; font-size: clamp(16px, 3.5vw, 22px);
    letter-spacing: 0.05em; display: block; line-height: 1;
  }

  .day-tag {
    font-size: clamp(7px, 1.6vw, 9px); font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); display: block;
    margin-top: 5px; line-height: 1.25; min-height: 22px;
  }

  .day-btn.active .day-tag { color: var(--accent-dim); }

  .day-dot {
    width: 4px; height: 4px; background: var(--accent); border-radius: 50%;
    margin: 6px auto 0; opacity: 0; transition: opacity 0.2s;
  }

  .day-btn.active .day-dot { opacity: 1; }

  .day-check {
    position: absolute; top: 5px; right: 5px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); color: var(--bg);
    display: none; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700;
  }

  .day-btn.completed .day-check { display: flex; }

  /* ─── PROGRESS BAR ────────────────────────────────────────────── */
  .week-progress {
    margin: 0 0 32px; padding: 14px 18px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  }

  .progress-label {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }

  .progress-label span { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .progress-label strong { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); letter-spacing: 0.04em; }

  .progress-track {
    width: 100%; height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden;
  }

  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), #c8dd20);
    border-radius: 3px; transition: width 0.6s var(--ease); width: 0;
  }

  /* ─── DIVIDER ─────────────────────────────────────────────────── */
  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 0 0 40px; }

  /* ─── PANEL ───────────────────────────────────────────────────── */
  .workout-panel { display: none; animation: slideIn 0.4s var(--ease); }
  .workout-panel.visible { display: block; }

  @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .panel-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 24px; flex-wrap: wrap; gap: 10px;
  }

  .panel-day-wrap { display: flex; flex-direction: column; gap: 2px; }

  .panel-day {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(34px, 8vw, 58px); letter-spacing: 0.03em; line-height: 1;
  }

  .panel-focus {
    font-size: 11px; font-weight: 600; color: var(--accent);
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 5px 12px; border: 1px solid rgba(232,255,71,0.25); border-radius: 999px;
    white-space: nowrap; background: rgba(232,255,71,0.04);
  }

  .panel-actions { display: flex; gap: 8px; }

  .btn-complete-all {
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
    border: 1px solid #2a2a2a; background: #1a1a1a; color: var(--muted);
    transition: all 0.2s;
  }

  .btn-complete-all:hover { border-color: var(--accent); color: var(--accent); }

  .btn-complete-all.done {
    background: rgba(232,255,71,0.1); border-color: var(--accent); color: var(--accent);
  }

  /* ─── EXERCISE CARDS ──────────────────────────────────────────── */
  .exercise-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
  }

  @media (max-width: 600px) {
    .exercise-list { grid-template-columns: 1fr; }
  }

  .exercise-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    display: flex; flex-direction: column;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    animation: itemIn 0.45s var(--ease) both;
    text-decoration: none; color: inherit;
    position: relative;
  }

  .exercise-item:active { transform: scale(0.98); }

  .exercise-item:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 0 0 1px rgba(232,255,71,0.15), 0 8px 32px rgba(232,255,71,0.05);
  }

  .exercise-item.checked-ex {
    border-color: rgba(232,255,71,0.2);
    background: linear-gradient(135deg, #0f100a, #111);
  }

  .exercise-item.checked-ex .ex-name { text-decoration: line-through; text-decoration-color: #444; color: var(--muted); }
  .exercise-item.checked-ex .ex-badge { opacity: 0.35; }
  .exercise-item.checked-ex .ex-sets-label { opacity: 0.35; }
  .exercise-item.checked-ex .ex-img-wrap { opacity: 0.5; }

  @keyframes itemIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  .exercise-item:nth-child(1) { animation-delay: 0.03s; }
  .exercise-item:nth-child(2) { animation-delay: 0.06s; }
  .exercise-item:nth-child(3) { animation-delay: 0.09s; }
  .exercise-item:nth-child(4) { animation-delay: 0.12s; }
  .exercise-item:nth-child(5) { animation-delay: 0.15s; }
  .exercise-item:nth-child(6) { animation-delay: 0.18s; }
  .exercise-item:nth-child(7) { animation-delay: 0.21s; }

  .ex-img-wrap {
    width: 100%; aspect-ratio: 16/10; background: #0a0a0a;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  .ex-img-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.35s ease;
  }

  .exercise-item:hover .ex-img-wrap img { transform: scale(1.06); }

  .img-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; color: #1e1e1e; }
  .img-placeholder svg { width: 36px; height: 36px; }
  .img-placeholder span { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; }

  .ex-yt-badge {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px; padding: 4px 8px;
    display: flex; align-items: center; gap: 5px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: #ccc;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    opacity: 0; transition: opacity 0.2s;
  }

  .ex-yt-badge svg { width: 11px; height: 11px; fill: #ff4444; flex-shrink: 0; }

  .exercise-item:hover .ex-yt-badge { opacity: 1; }
  @media (max-width: 600px) { .ex-yt-badge { opacity: 1; } }

  .spinner { width: 22px; height: 22px; border: 2px solid #1a1a1a; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .img-loading { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .img-loading span { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #222; }

  .ex-body {
    padding: 12px 14px 14px; display: flex; align-items: center;
    justify-content: space-between; gap: 10px;
  }

  .ex-number {
    font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: #222; line-height: 1;
    min-width: 28px; height: 28px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    border: 1.5px solid #222; border-radius: 50%;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0;
    -webkit-user-select: none; user-select: none;
  }

  .ex-number:active { transform: scale(0.9); }

  .exercise-item.checked-ex .ex-number {
    background: var(--accent); border-color: var(--accent); color: var(--bg);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
    box-shadow: 0 0 10px rgba(232,255,71,0.25);
  }

  .ex-info { flex: 1; }
  .ex-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .ex-sets-label { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.04em; }
  .ex-badge { font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: var(--accent); letter-spacing: 0.04em; white-space: nowrap; padding-top: 2px; }

  /* ─── CLEAR DAY BUTTON ────────────────────────────────────────── */
  .btn-clear-day {
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
    border: 1px solid #2a2a2a; background: #1a1a1a; color: var(--muted);
    transition: all 0.2s;
  }

  .btn-clear-day:hover { border-color: #ff4444; color: #ff4444; }

  .btn-complete-all {
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
    border: 1px solid #2a2a2a; background: #1a1a1a; color: var(--muted);
    transition: all 0.2s;
  }

  .btn-complete-all:hover { border-color: var(--accent); color: var(--accent); }

  .btn-complete-all.done {
    background: rgba(232,255,71,0.1); border-color: var(--accent); color: var(--accent);
  }

  /* ─── STATS ───────────────────────────────────────────────────── */
  .stats-row { display: flex; gap: 8px; margin-top: 24px; flex-wrap: wrap; }

  .stat-chip {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px;
    font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.04em;
    flex: 1; min-width: 80px;
  }

  .stat-chip span {
    display: block; font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; color: var(--text); letter-spacing: 0.03em; line-height: 1.1;
  }

  /* ─── REST PANEL ──────────────────────────────────────────────── */
  .rest-panel {
    text-align: center; padding: 60px 20px;
    border: 1px dashed #1a1a1a; border-radius: 20px;
    animation: slideIn 0.35s ease;
  }

  .rest-emoji { font-size: 48px; margin-bottom: 16px; display: block; }
  .rest-panel h2 { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 0.05em; color: #2a2a2a; }
  .rest-panel p { color: var(--muted); font-size: 13px; margin-top: 8px; }

  /* ─── FOOTER ──────────────────────────────────────────────────── */
  footer {
    text-align: center; padding: 48px 0 32px;
    font-size: 11px; color: #1a1a1a; letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* ─── MOBILE TWEAKS ───────────────────────────────────────────── */
  @media (max-width: 600px) {
    header { padding: 36px 0 20px; }
    .panel-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .panel-header > div:last-child { width: 100%; align-items: flex-start !important; }
    .panel-header > div:last-child > div { width: 100%; }
    .btn-complete-all, .btn-clear-day { flex: 1; text-align: center; }
    .stats-row { gap: 6px; }
    .stat-chip { padding: 8px 12px; font-size: 10px; }
    .stat-chip span { font-size: 20px; }
    .week-progress { padding: 12px 14px; }
  }

  /* ─── SCROLL BAR ──────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
</style>
</head>
<body>

<!-- ═══ LOCK SCREEN ═══ -->
<div id="lockScreen">
  <div class="lock-inner">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="lock-title">Private Access</div>
    <p class="lock-sub">Enter your PIN to continue</p>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>
    <div class="pin-pad" id="pinPad">
      <button class="pin-key" data-val="1">1</button>
      <button class="pin-key" data-val="2">2</button>
      <button class="pin-key" data-val="3">3</button>
      <button class="pin-key" data-val="4">4</button>
      <button class="pin-key" data-val="5">5</button>
      <button class="pin-key" data-val="6">6</button>
      <button class="pin-key" data-val="7">7</button>
      <button class="pin-key" data-val="8">8</button>
      <button class="pin-key" data-val="9">9</button>
      <button class="pin-key del" data-val="del">DEL</button>
      <button class="pin-key" data-val="0">0</button>
      <button class="pin-key accent" data-val="go">→</button>
    </div>
    <div class="lock-error-msg" id="lockError"></div>
  </div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="app">
  <div class="container">
    <header>
      <p class="header-eyebrow">By Abdulaziz Alharbi</p>
      <h1>MY<br><span>TRAINING</span><br>WEEK</h1>
      <p class="header-sub">Tap a day to view your workout</p>
      <div class="today-badge" id="todayBadge">
        <div class="pulse-dot"></div>
        <span id="todayLabel">Today</span>
      </div>
    </header>
    <div id="db-status">Loading exercise images…</div>
    <div class="days-grid" id="daysGrid"></div>

    <div class="week-progress" id="weekProgress">
      <div class="progress-label">
        <span>Week Progress</span>
        <strong id="progressText">0 / 5</strong>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="divider"></div>
    <div id="workoutDisplay"></div>
    <footer>Built for the grind &mdash; stay consistent</footer>
  </div>
</div>

<script>
// ─── PIN AUTH ────────────────────────────────────────────────────────────────
(function initAuth() {
  const PASS = "123";
  const AUTH_KEY = "training_auth_v1";

  // Already authed? Skip lock screen
  try {
    if (localStorage.getItem(AUTH_KEY) === "granted") {
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      return;
    }
  } catch(e) {}

  let pin = "";
  const dots = document.querySelectorAll('#pinDots .pin-dot');
  const errEl = document.getElementById('lockError');

  function updateDots() {
    dots.forEach((d, i) => {
      d.classList.toggle('filled', i < pin.length);
      d.classList.remove('error');
    });
  }

  function tryUnlock() {
    if (pin === PASS) {
      try { localStorage.setItem(AUTH_KEY, "granted"); } catch(e) {}
      const ls = document.getElementById('lockScreen');
      ls.classList.add('unlocked');
      document.getElementById('app').classList.add('visible');
      setTimeout(() => ls.style.display = 'none', 600);
    } else {
      dots.forEach(d => d.classList.add('error'));
      errEl.textContent = "Wrong PIN — try again";
      setTimeout(() => { pin = ""; updateDots(); errEl.textContent = ""; }, 800);
    }
  }

  document.getElementById('pinPad').addEventListener('click', (e) => {
    const btn = e.target.closest('.pin-key');
    if (!btn) return;
    const val = btn.dataset.val;
    if (val === 'del') {
      pin = pin.slice(0, -1);
      updateDots();
    } else if (val === 'go') {
      tryUnlock();
    } else if (pin.length < PASS.length) {
      pin += val;
      updateDots();
      if (pin.length === PASS.length) setTimeout(tryUnlock, 200);
    }
  });

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (document.getElementById('lockScreen').style.display === 'none') return;
    if (e.key >= '0' && e.key <= '9' && pin.length < PASS.length) {
      pin += e.key; updateDots();
      if (pin.length === PASS.length) setTimeout(tryUnlock, 200);
    } else if (e.key === 'Backspace') {
      pin = pin.slice(0, -1); updateDots();
    } else if (e.key === 'Enter') { tryUnlock(); }
  });
})();

// ─── WORKOUT DATA ────────────────────────────────────────────────────────────
const workouts = {
  Sunday: {
    focus: "Back, Biceps & Abs",
    exercises: [
      { name: "Lat Pulldown",            search: "lat pulldown",           sets: "3", reps: "8–10"   },
      { name: "Lever Pronated Row",       search: "seated cable row",       sets: "3", reps: "8–10"   },
      { name: "Seated V-Bar Row",         search: "close grip cable row",   sets: "3", reps: "10–12"  },
      { name: "Straight Arm Pulldown",    search: "straight arm pulldown",  sets: "3", reps: "12–15"  },
      { name: "Seated DB Curl",           search: "seated dumbbell curl",   sets: "3", reps: "8–10"   },
      { name: "Cable Curl",               search: "cable curl",             sets: "3", reps: "12–15"  },
      { name: "Ab Machine Crunch",        search: "ab crunch machine",      sets: "3", reps: "15–20"  },
    ]
  },
  Monday: {
    focus: "Chest & Triceps",
    exercises: [
      { name: "Incline DB Press",         search: "incline dumbbell press", sets: "3", reps: "6–8"    },
      { name: "Flat Barbell Bench",       search: "barbell bench press",    sets: "3", reps: "6–8"    },
      { name: "Chest Press Machine",      search: "chest press machine",    sets: "3", reps: "10–12"  },
      { name: "Cable Fly / Pec Deck",     search: "cable crossover",        sets: "3", reps: "12–15"  },
      { name: "DB Lateral Raise",         search: "lateral raise dumbbell", sets: "3", reps: "15"     },
      { name: "Tricep Pushdown",          search: "triceps pushdown",       sets: "3", reps: "10–12"  },
      { name: "Overhead Cable Extension", search: "overhead triceps cable", sets: "3", reps: "12–15"  },
    ]
  },
  Tuesday: {
    focus: "Legs, Posterior Chain & Abs",
    exercises: [
      { name: "Squat (Barbell or Smith)", search: "barbell squat",          sets: "4", reps: "6–10"   },
      { name: "Deadlift or RDL",          search: "romanian deadlift",      sets: "3", reps: "6–8"    },
      { name: "Leg Press",                search: "leg press",              sets: "3", reps: "10–12"  },
      { name: "Leg Extension",            search: "leg extension",          sets: "3", reps: "12–15"  },
      { name: "Leg Curl",                 search: "leg curl",               sets: "3", reps: "12–15"  },
      { name: "Calf Raises",              search: "standing calf raise",    sets: "4", reps: "15–20"  },
      { name: "Ab Machine Crunch",        search: "ab crunch machine",      sets: "3", reps: "15–20"  },
    ]
  },
  Wednesday: {
    focus: "Shoulders & Rear Delts",
    exercises: [
      { name: "Shoulder Press",           search: "barbell shoulder press", sets: "3", reps: "8–12"   },
      { name: "DB Lateral Raise",         search: "lateral raise dumbbell", sets: "4", reps: "15–20"  },
      { name: "Rear Delt Machine",        search: "rear delt fly",          sets: "3", reps: "12–15"  },
      { name: "Face Pulls",               search: "face pull",              sets: "3", reps: "15–20"  },
    ]
  },
  Thursday: {
    focus: "Chest, Arms & Abs",
    exercises: [
      { name: "Incline DB Press",         search: "incline dumbbell press", sets: "3", reps: "10–12"  },
      { name: "Cable Fly",                search: "cable crossover",        sets: "3", reps: "15"     },
      { name: "Pushups",                  search: "push-up",                sets: "2", reps: "Failure" },
      { name: "Preacher Curl",            search: "preacher curl",          sets: "3", reps: "12–15"  },
      { name: "Hammer Curl",              search: "hammer curl",            sets: "2", reps: "10–12"  },
      { name: "Rope Pushdown",            search: "triceps pushdown rope",  sets: "3", reps: "12–15"  },
      { name: "Ab Machine Crunch",        search: "ab crunch machine",      sets: "3", reps: "15–20"  },
    ]
  },
  Friday:   { rest: true },
  Saturday: { rest: true },
};

const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const short = { Sunday:"SUN", Monday:"MON", Tuesday:"TUE", Wednesday:"WED", Thursday:"THU", Friday:"FRI", Saturday:"SAT" };

// ─── TRACKING STATE ──────────────────────────────────────────────────────────
const TRACK_KEY = "training_track_v2";

function getWeekId() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 1);
  const week = Math.ceil(((now - start) / 86400000 + start.getDay() + 1) / 7);
  return `${now.getFullYear()}-W${week}`;
}

function loadTracking() {
  try {
    const raw = localStorage.getItem(TRACK_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (data.week === getWeekId()) return data;
    }
  } catch(e) {}
  return { week: getWeekId(), completed: {}, exercises: {} };
}

function saveTracking(data) {
  try { localStorage.setItem(TRACK_KEY, JSON.stringify(data)); } catch(e) {}
}

let tracking = loadTracking();

function isExChecked(day, idx) {
  return tracking.exercises[`${day}-${idx}`] === true;
}

function toggleEx(day, idx) {
  const key = `${day}-${idx}`;
  tracking.exercises[key] = !tracking.exercises[key];
  // Check if all exercises for this day are done
  const w = workouts[day];
  if (!w.rest) {
    const allDone = w.exercises.every((_, i) => tracking.exercises[`${day}-${i}`]);
    tracking.completed[day] = allDone;
  }
  saveTracking(tracking);
  updateProgress();
}

function isDayCompleted(day) {
  return tracking.completed[day] === true;
}

function markDayComplete(day) {
  const w = workouts[day];
  if (w.rest) return;
  const allChecked = w.exercises.every((_, i) => tracking.exercises[`${day}-${i}`]);
  const newState = !allChecked;
  w.exercises.forEach((_, i) => {
    tracking.exercises[`${day}-${i}`] = newState;
  });
  tracking.completed[day] = newState;
  saveTracking(tracking);
  updateProgress();
  if (currentDay === day) selectDay(day);
}

function clearDay(day) {
  const w = workouts[day];
  if (w.rest) return;
  w.exercises.forEach((_, i) => {
    tracking.exercises[`${day}-${i}`] = false;
  });
  tracking.completed[day] = false;
  saveTracking(tracking);
  updateProgress();
  if (currentDay === day) selectDay(day);
}

function updateDayUI(day) {
  const w = workouts[day];
  const checkedNow = w.exercises.filter((_, j) => isExChecked(day, j)).length;
  const allNow = checkedNow === w.exercises.length;
  // Update done count
  const doneEl = document.getElementById('doneCount');
  if (doneEl) doneEl.textContent = `${checkedNow}/${w.exercises.length}`;
  // Update buttons
  const completeBtn = document.querySelector('.btn-complete-all');
  if (completeBtn) {
    completeBtn.classList.toggle('done', allNow);
    completeBtn.textContent = allNow ? '✓ Done' : 'All Done';
  }
  const clearBtn = document.getElementById('btnClear');
  if (clearBtn) {
    clearBtn.style.opacity = checkedNow > 0 ? '1' : '0.3';
    clearBtn.style.pointerEvents = checkedNow > 0 ? 'auto' : 'none';
  }
  // Update overall tracking
  tracking.completed[day] = allNow;
  saveTracking(tracking);
  updateProgress();
}

// ─── IMAGE DATABASE ──────────────────────────────────────────────────────────
const IMG_BASE = "https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/";
const DB_URL   = "https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/dist/exercises.json";
const CACHE_KEY = "exercise_img_cache_v1";

let imageMap = {};
let dbReady = false;

function normalize(str) { return str.toLowerCase().replace(/[^a-z0-9 ]/g, '').trim(); }

function score(dbName, query) {
  const d = normalize(dbName), q = normalize(query);
  if (d === q) return 100;
  if (d.includes(q)) return 80;
  const words = q.split(' ');
  const matched = words.filter(w => d.includes(w)).length;
  return Math.round((matched / words.length) * 60);
}

async function loadDatabase() {
  const status = document.getElementById('db-status');
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) { imageMap = JSON.parse(cached); dbReady = true; status.classList.add('hidden'); return; }
  } catch(e) {}

  try {
    status.textContent = "Fetching exercise database…";
    const res = await fetch(DB_URL);
    const exercises = await res.json();
    const allSearchTerms = new Set();
    for (const day of days) { const w = workouts[day]; if (!w.rest) w.exercises.forEach(ex => allSearchTerms.add(ex.search)); }
    for (const term of allSearchTerms) {
      let best = null, bestScore = 0;
      for (const ex of exercises) { const s = score(ex.name, term); if (s > bestScore) { bestScore = s; best = ex; } }
      if (best && best.images && best.images.length > 0) imageMap[term] = IMG_BASE + best.images[0];
    }
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(imageMap)); } catch(e) {}
    dbReady = true;
    status.textContent = "Images loaded ✓";
    setTimeout(() => status.classList.add('hidden'), 1200);
    refreshCurrentImages();
  } catch(e) {
    status.textContent = "Could not load images — tap a day to continue";
    setTimeout(() => status.classList.add('hidden'), 2500);
  }
}

function getImageUrl(searchTerm) { return imageMap[searchTerm] || null; }

const placeholderHTML = `<div class="img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="8" width="4" height="8" rx="1"/><rect x="17" y="8" width="4" height="8" rx="1"/><rect x="7" y="10" width="10" height="4" rx="1"/></svg><span>No image</span></div>`;
const loadingHTML = `<div class="img-loading"><div class="spinner"></div><span>Loading</span></div>`;

function setImage(slot, url) {
  if (!url) { slot.innerHTML = placeholderHTML; return; }
  const img = new Image();
  img.onload = () => { slot.innerHTML = ''; slot.appendChild(img); };
  img.onerror = () => { slot.innerHTML = placeholderHTML; };
  img.src = url; img.alt = '';
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.35s ease';
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentDay = null;

function refreshCurrentImages() {
  if (!currentDay) return;
  const w = workouts[currentDay];
  if (!w || w.rest) return;
  w.exercises.forEach((ex, i) => {
    const slot = document.getElementById(`img-${currentDay}-${i}`);
    if (slot && slot.querySelector('.img-loading')) setImage(slot, getImageUrl(ex.search));
  });
}

// ─── PROGRESS ────────────────────────────────────────────────────────────────
function updateProgress() {
  const trainingDays = days.filter(d => !workouts[d].rest);
  const done = trainingDays.filter(d => isDayCompleted(d)).length;
  const total = trainingDays.length;
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = `${(done / total) * 100}%`;

  // Update day button checkmarks
  document.querySelectorAll('.day-btn').forEach(btn => {
    const day = btn.dataset.day;
    btn.classList.toggle('completed', isDayCompleted(day));
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
const grid = document.getElementById('daysGrid');
const display = document.getElementById('workoutDisplay');
const todayIdx = new Date().getDay();
const todayName = days[todayIdx];

document.getElementById('todayLabel').textContent = todayName.toUpperCase();

days.forEach(day => {
  const w = workouts[day];
  const btn = document.createElement('button');
  btn.className = 'day-btn' + (w.rest ? ' rest-day' : '') + (isDayCompleted(day) ? ' completed' : '');
  btn.dataset.day = day;
  const isToday = day === todayName;
  btn.innerHTML = `
    <span class="day-name">${short[day]}</span>
    <span class="day-tag">${w.rest ? 'Rest' : w.focus.split(',')[0].split('&')[0].trim()}</span>
    <div class="day-dot"></div>
    <div class="day-check">✓</div>
  `;
  if (isToday && !w.rest) btn.style.borderColor = '#333';
  if (!w.rest) btn.addEventListener('click', () => selectDay(day));
  grid.appendChild(btn);
});

function selectDay(day) {
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-day="${day}"]`).classList.add('active');
  currentDay = day;
  const w = workouts[day];

  if (w.rest) {
    display.innerHTML = `<div class="rest-panel"><span class="rest-emoji">💤</span><h2>Rest Day</h2><p>Recovery is part of the program. Sleep, eat, repeat.</p></div>`;
    return;
  }

  const totalSets = w.exercises.reduce((s, e) => s + parseInt(e.sets), 0);
  const checkedCount = w.exercises.filter((_, i) => isExChecked(day, i)).length;
  const allDone = checkedCount === w.exercises.length;

  display.innerHTML = `
    <div class="workout-panel visible">
      <div class="panel-header">
        <div class="panel-day-wrap">
          <div class="panel-day">${day}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
          <div class="panel-focus">${w.focus}</div>
          <div style="display:flex;gap:6px;">
            <button class="btn-clear-day" id="btnClear" onclick="clearDay('${day}')" style="${checkedCount > 0 ? '' : 'opacity:0.3;pointer-events:none;'}">Clear</button>
            <button class="btn-complete-all ${allDone ? 'done' : ''}" onclick="markDayComplete('${day}')">${allDone ? '✓ Done' : 'All Done'}</button>
          </div>
        </div>
      </div>
      <div class="exercise-list" id="exList"></div>
      <div class="stats-row">
        <div class="stat-chip"><span>${w.exercises.length}</span>Exercises</div>
        <div class="stat-chip"><span>${totalSets}</span>Total Sets</div>
        <div class="stat-chip"><span id="doneCount">${checkedCount}/${w.exercises.length}</span>Done</div>
      </div>
    </div>`;

  const list = document.getElementById('exList');

  w.exercises.forEach((ex, i) => {
    const ytQuery = encodeURIComponent(ex.name + ' exercise how to');
    const ytUrl = `https://www.youtube.com/results?search_query=${ytQuery}&sp=EgIYAQ%3D%3D`;
    const checked = isExChecked(day, i);

    const card = document.createElement('div');
    card.className = 'exercise-item' + (checked ? ' checked-ex' : '');
    card.style.animationDelay = (0.03 + i * 0.03) + 's';
    card.dataset.idx = i;

    const imgSlotId = `img-${day}-${i}`;
    card.innerHTML = `
      <a href="${ytUrl}" target="_blank" rel="noopener noreferrer" style="text-decoration:none;color:inherit;display:contents;">
        <div class="ex-img-wrap" id="${imgSlotId}">
          ${loadingHTML}
          <div class="ex-yt-badge">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M23.5 6.2s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.8 2 12 2 12 2s-4.8 0-7.3.1c-.6.1-1.9.1-3 1.3C.8 4.2.5 6.2.5 6.2S.2 8.5.2 10.8v2.1c0 2.3.3 4.6.3 4.6s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.2 21.7 12 21.8 12 21.8s4.8 0 7.3-.2c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.3.3-4.6v-2.1c0-2.3-.3-4.6-.3-4.6zM9.7 15.5V8.4l8.1 3.6-8.1 3.5z"/></svg>
            Watch
          </div>
        </div>
      </a>
      <div class="ex-body">
        <span class="ex-number" data-num="${String(i+1).padStart(2,'0')}">${checked ? '✓' : String(i+1).padStart(2,'0')}</span>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-sets-label">${ex.sets} sets</div>
        </div>
        <div class="ex-badge">${ex.sets}&times;${ex.reps}</div>
      </div>`;

    // Number circle = toggle
    card.querySelector('.ex-number').addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      toggleEx(day, i);
      const isNow = isExChecked(day, i);
      card.classList.toggle('checked-ex', isNow);
      const numEl = card.querySelector('.ex-number');
      numEl.textContent = isNow ? '✓' : numEl.dataset.num;
      updateDayUI(day);
    });

    list.appendChild(card);

    if (dbReady) {
      const slot = card.querySelector(`#${imgSlotId}`);
      if (slot) setImage(slot, getImageUrl(ex.search));
    }
  });

  // Smooth scroll to panel on mobile
  if (window.innerWidth <= 600) {
    setTimeout(() => display.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadDatabase();
updateProgress();

if (!workouts[todayName].rest) {
  selectDay(todayName);
} else {
  for (let i = 1; i <= 7; i++) {
    const next = days[(todayIdx + i) % 7];
    if (!workouts[next].rest) { selectDay(next); break; }
  }
}
</script>
